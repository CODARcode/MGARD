name: build-and-test
on: [push]
env:
        BUILD_TYPE: Release
        BUILD_DIR: ${{github.workspace}}/build
jobs:
        APT:
                runs-on: ubuntu-latest
                steps:
                        - run: sudo apt-get install mpich libmpich-dev autoconf autogen libtool liblapack-dev libarchive-dev libyaml-cpp-dev libtclap-dev

        build-MOAB:
                needs: [APT]
                runs-on: ubuntu-latest
                steps:
                        - run: wget https://ftp.mcs.anl.gov/pub/fathom/moab-5.2.1.tar.gz
                        - run: gunzip "moab-5.2.1.tar.gz"
                        - run: tar --file "moab-5.2.1.tar" --extract
                        - run: cd "moab-5.2.1"
                        - run: autoreconf --force --install
                        - run: ./configure --prefix="${HOME}/.local"
                        - run: make --jobs 8
                        - run: make install

        build-cppcheck:
                needs: [APT]
                runs-on: ubuntu-latest
                steps: 
                        - run: wget https://github.com/danmar/cppcheck/archive/2.3.tar.gz
                        - run: gunzip "2.3.tar.gz"
                        - run: tar --file "2.3.tar" --extract
                        - run: cd "cppcheck-2.3"
                        - run: cmake -S . -B "build" -DCMAKE_INSTALL_PREFIX="${HOME}/.local"
                        - run: cmake --build "build" --parallel
                        - run: cmake --install "build"

        build-Catch2:
                needs: [APT]
                runs-on: ubuntu-latest
                steps:
                        - run: wget https://github.com/catchorg/Catch2/archive/v3.0.0-preview3.tar.gz
                        - run: gunzip "v3.0.0-preview3.tar.gz"
                        - run: tar --file "v3.0.0-preview3.tar" --extract
                        - run: cd "Catch2-3.0.0-preview3"
                        - run: cmake -S . -B "build" -DCMAKE_INSTALL_PREFIX="${HOME}/.local"
                        - run: cmake --build "build" --parallel
                        - run: cmake --install "build"

        build-MGARD:
                needs: [build-MOAB, build-Catch2]
                runs-on: ubuntu-latest
                steps:
                        - name: checkout
                          uses: actions/checkout@v2.3.4
                        - name: configure
                          run: cmake -S . -B ${{env.BUILD_DIR}} -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
                        - name: build
                          run: cmake --build ${{env.BUILD_DIR}} --parallel
        test:
                needs: [build-MGARD]
                runs-on: ubuntu-latest
                steps:
                        - run: ${{env.BUILD_DIR}}/bin/tests
